<!DOCTYPE html>
<html>
<head>
<title>Kuis Bahasa Inggris</title>

<style>
body{
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
}

header{
    background:#2c3e50;
    color:white;
    padding:15px;
    text-align:center;
}

nav{
    background:#3498db;
    padding:10px;
    text-align:center;
}

nav a{
    color:white;
    margin:10px;
    text-decoration:none;
    font-weight:bold;
}

.container{
    max-width:800px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
    padding:10px 15px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

#result{
    font-size:20px;
    margin-top:20px;
}
</style>

</head>

<body>

<header>
<h2>Kuis Bahasa Inggris (5 Soal)</h2>
</header>

<nav>
<a href="index.html">Home</a>
<a href="kuis.html">Kuis</a>
<a href="tentang.html">Tentang</a>
</nav>

<div class="container">

<!-- SOAL 1 -->
<div class="card">
<p>1. What is the English of "Buku"?</p>
<input type="radio" name="q1" value="0"> Pen<br>
<input type="radio" name="q1" value="1"> Book<br>
<input type="radio" name="q1" value="0"> Chair<br>
</div>

<!-- SOAL 2 -->
<div class="card">
<p>2. What is "Apple" in Indonesian?</p>
<input type="radio" name="q2" value="1"> Apel<br>
<input type="radio" name="q2" value="0"> Jeruk<br>
<input type="radio" name="q2" value="0"> Mangga<br>
</div>

<!-- SOAL 3 -->
<div class="card">
<p>3. Choose the correct greeting:</p>
<input type="radio" name="q3" value="1"> Good morning<br>
<input type="radio" name="q3" value="0"> Good night<br>
<input type="radio" name="q3" value="0"> Good eating<br>
</div>

<!-- SOAL 4 -->
<div class="card">
<p>4. What color is the sky?</p>
<input type="radio" name="q4" value="1"> Blue<br>
<input type="radio" name="q4" value="0"> Red<br>
<input type="radio" name="q4" value="0"> Green<br>
</div>

<!-- SOAL 5 -->
<div class="card">
<p>5. I ___ a student.</p>
<input type="radio" name="q5" value="1"> am<br>
<input type="radio" name="q5" value="0"> is<br>
<input type="radio" name="q5" value="0"> are<br>
</div>

<button onclick="checkScore()">Lihat Nilai</button>

<div id="result"></div>
<br><br>
<button onclick="location.reload()">Ulangi Kuis</button>
</div>

<script>
function checkScore(){
    let score = 0;

    for(let i=1;i<=5;i++){
        let answer = document.querySelector('input[name="q'+i+'"]:checked');
        if(answer){
            score += parseInt(answer.value);
        }
    }

    let finalScore = (score/5)*100;

    let text = "";
let kategori = "";

if(finalScore >= 80){
    kategori = "🎉 LULUS";
} else if(finalScore >= 60){
    kategori = "⚠️ CUKUP";
} else {
    kategori = "❌ REMEDIAL";
}

text = kategori + "<br>Nilai kamu: " + finalScore;

    document.getElementById("result").innerHTML =
"<div style='background:white;padding:20px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.15);margin-top:20px;font-size:20px;text-align:center'>" +
text +
"</div>";
}
</script>

</body>
</html>
