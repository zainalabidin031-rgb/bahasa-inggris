<!DOCTYPE html>
<html>
<head>
<title>Kuis Bahasa Inggris</title>

<style>
body{
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
}

header{
    background:#2c3e50;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    max-width:800px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
    padding:10px 15px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

#result{
    font-size:20px;
    margin-top:20px;
}
</style>

</head>

<body>

<header>
<h2>Kuis Bahasa Inggris</h2>
</header>

<nav style="background:#3498db;padding:12px;text-align:center;">
<a href="index.html" style="color:white;margin:10px;text-decoration:none;font-weight:bold;">🏠 Home</a>
<a href="kuis.html" style="color:white;margin:10px;text-decoration:none;font-weight:bold;">📝 Kuis</a>
<a href="tentang.html" style="color:white;margin:10px;text-decoration:none;font-weight:bold;">ℹ️ Tentang</a>
</nav>


<div class="container">

<div class="card">
<p>1. What is "Book" in Indonesian?</p>
<input type="radio" name="q1" value="1"> Buku<br>
<input type="radio" name="q1" value="0"> Meja<br>
<input type="radio" name="q1" value="0"> Kursi<br>
</div>

<div class="card">
<p>2. What is "Apple"?</p>
<input type="radio" name="q2" value="1"> Apel<br>
<input type="radio" name="q2" value="0"> Pisang<br>
<input type="radio" name="q2" value="0"> Jeruk<br>
</div>

<div class="card">
<p>3. "Good morning" artinya?</p>
<input type="radio" name="q3" value="1"> Selamat pagi<br>
<input type="radio" name="q3" value="0"> Selamat malam<br>
<input type="radio" name="q3" value="0"> Selamat tinggal<br>
</div>

<div class="card">
<p>4. What color is the sky?</p>
<input type="radio" name="q4" value="1"> Blue<br>
<input type="radio" name="q4" value="0"> Red<br>
<input type="radio" name="q4" value="0"> Green<br>
</div>

<div class="card">
<p>5. I ___ a student.</p>
<input type="radio" name="q5" value="1"> am<br>
<input type="radio" name="q5" value="0"> is<br>
<input type="radio" name="q5" value="0"> are<br>
</div>

<button onclick="submitQuiz()">Submit</button>

<div id="result"></div>

<button onclick="location.reload()">Ulangi</button>

</div>

<script>
function submitQuiz(){
    let score = 0;

    for(let i=1;i<=5;i++){
        let answer = document.querySelector('input[name="q'+i+'"]:checked');
        if(answer){
            score += parseInt(answer.value);
        }
    }

    let finalScore = (score/5)*100;

    let kategori = "";

    if(finalScore >= 80){
        kategori = "LULUS 🎉";
    } else if(finalScore >= 60){
        kategori = "CUKUP ⚠️";
    } else {
        kategori = "REMEDIAL ❌";
    }

    document.getElementById("result").innerHTML =
        "Nilai kamu: " + finalScore + "<br>" + kategori;
}
</script>

</body>
</html>
